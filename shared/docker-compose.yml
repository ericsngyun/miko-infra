# shared/docker-compose.yml — Ollama, LLM Gateway, Redis, Caddy
# Deploy: Day 2 AM (first stack)
# Gate: LLM Gateway /health 200. PRIVILEGED routes local only. Cloud fallback available.
name: awaas-shared

services:
  ollama:
    image: ${OLLAMA_IMAGE}
    container_name: ollama
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "993"
      - "44"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models/production
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=3
    volumes:
      - /mnt/models:/models
    networks:
      - shared-net
    # No ports exposed to host — accessed only via LLM Gateway
    # Direct access on 11434 only for Day 1 benchmarks (remove after)
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512m,mode=1777

  ollama-staging:
    image: ${OLLAMA_IMAGE}
    container_name: ollama-staging
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "993"
      - "44"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models/staging
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - /mnt/models:/models
    networks:
      - shared-net
    # Staging runs on port 11436 internally for Model Olympics
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m,mode=1777

  llm-gateway:
    image: python:3.12-slim
    container_name: llm-gateway
    restart: unless-stopped
    command: ["uvicorn", "gateway:app", "--host", "0.0.0.0", "--port", "11435"]
    working_dir: /app
    volumes:
      - ./llm-gateway:/app:ro
      - /mnt/audit/logs:/mnt/audit/logs
    environment:
      - CONFIG_PATH=/app/config.yaml
      - MASTER_PG_HOST=master-postgres
      - MASTER_PG_PORT=5432
    env_file:
      - /etc/awaas-image-pins.env
    networks:
      - shared-net
      - orchestrator-net       # needs master-postgres for audit writes
    security_opt:
      - apparmor:docker-default
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    user: "1000:1000"

  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - shared-net
    security_opt:
      - apparmor:docker-default
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "999:999"

  caddy:
    image: ${CADDY_IMAGE}
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - shared-net
      - pleadly-net
      - awaas-net
    ports:
      # Only accessible via Tailscale interface (UFW blocks LAN)
      - "443:443"
      - "80:80"
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

volumes:
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/redis
  caddy-data:
  caddy-config:

networks:
  shared-net:
    name: awaas-shared
  orchestrator-net:
    external: true
    name: awaas-orchestrator
  pleadly-net:
    external: true
    name: awaas-pleadly
  awaas-net:
    external: true
    name: awaas-services
