services:
  miko:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miko
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      - LLAMA_SERVER_URL=http://172.23.0.1:11435
      - EMBED_SERVER_URL=http://172.23.0.1:11436
      - PLEADLY_API_URL=http://172.23.0.1:8300
      - QDRANT_URL=http://awaas-qdrant:6333
      - QDRANT_API_KEY=2fe53fc367794a59490be07e5ec97ccacb0bff8a2ab696eaea1caad7d26aa632
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ERIC_CHAT_ID=7355900090
      - DAVID_CHAT_ID=1697120532
      - MIKO_MODEL=Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
      - MIKO_FAST_MODEL=Qwen3.5-4B-Q4_K_M.gguf
      - FAST_SERVER_URL=http://172.23.0.1:11437
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - N8N_URL=${N8N_URL}
      - CLAUDE_FAST_MODEL=claude-haiku-4-5-20251001
      - CLAUDE_DEFAULT_MODEL=claude-sonnet-4-6
      - CLAUDE_DEEP_MODEL=claude-opus-4-6
      - MASTER_POSTGRES_DSN=postgresql://awaas_master:c784b47fc96ec5fe8981a3fab61fec8e34936990755f3ad1c60438bc1bf8a2d2@master-postgres:5432/awaas_master
    networks:
      - awaas-shared
      - awaas-monitor
      - awaas-services
      - awaas-orchestrator
    volumes:
      - ./SOUL.md:/app/SOUL.md:ro
      - ./static:/app/static:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/miko_node_001/awaas/workspace:/workspace:rw
      - /home/miko_node_001/awaas:/awaas:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/git:/usr/bin/git:ro
      - /usr/lib/git-core:/usr/lib/git-core:ro
      - /usr/share/git-core:/usr/share/git-core:ro
      - /lib/x86_64-linux-gnu/libpcre2-8.so.0:/lib/x86_64-linux-gnu/libpcre2-8.so.0:ro
      - /lib/x86_64-linux-gnu/libz.so.1:/lib/x86_64-linux-gnu/libz.so.1:ro
      - /home/miko_node_001/awaas/miko/.gitconfig:/root/.gitconfig:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  awaas-shared:
    external: true
  awaas-monitor:
    external: true
  awaas-services:
    external: true
  awaas-orchestrator:
    external: true
