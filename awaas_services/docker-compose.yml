# awaas_services/docker-compose.yml — CONFIDENTIAL data class
# Deploy: Day 4
# Gate: CONFIDENTIAL routes local first, cloud fallback available. Network isolation verified.
name: awaas-services

services:
  awaas-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: awaas-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${AWAAS_PG_USER}
      - POSTGRES_PASSWORD=${AWAAS_PG_PASSWORD}
      - POSTGRES_DB=${AWAAS_PG_DATABASE}
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
    volumes:
      - awaas-pg-data:/var/lib/postgresql/data
    networks:
      - awaas-net
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    tmpfs:
      - /tmp:size=128m,mode=1777
    shm_size: '256mb'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AWAAS_PG_USER} -d ${AWAAS_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  awaas-qdrant:
    image: ${QDRANT_IMAGE}
    container_name: awaas-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__API_KEY=${AWAAS_QDRANT_API_KEY}
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - awaas-qdrant-data:/qdrant/storage
    networks:
      - awaas-net
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETUID, SETGID]
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 15s
      timeout: 5s
      retries: 3

  awaas-api:
    image: python:3.12-slim
    container_name: awaas-api
    restart: unless-stopped
    command: ["uvicorn", "awaas_api.main:app", "--host", "0.0.0.0", "--port", "8400"]
    working_dir: /app
    volumes:
      - ./app:/app:ro
    environment:
      - PG_HOST=awaas-postgres
      - PG_PORT=5432
      - PG_USER=${AWAAS_PG_USER}
      - PG_PASSWORD=${AWAAS_PG_PASSWORD}
      - PG_DATABASE=${AWAAS_PG_DATABASE}
      - QDRANT_HOST=awaas-qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${AWAAS_QDRANT_API_KEY}
      - LLM_GATEWAY_URL=http://llm-gateway:11435
      - DATA_CLASS=CONFIDENTIAL
      - ACTION_GATEWAY_URL=http://action-gateway:8200
    networks:
      - awaas-net
      - shared-net
      - orchestrator-net     # needs Action Gateway
    depends_on:
      awaas-postgres:
        condition: service_healthy
      awaas-qdrant:
        condition: service_healthy
    security_opt:
      - apparmor:docker-default
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    user: "1000:1000"

  awaas-n8n:
    image: ${N8N_IMAGE}
    container_name: awaas-n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=awaas-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${AWAAS_PG_DATABASE}
      - DB_POSTGRESDB_USER=${AWAAS_PG_USER}
      - DB_POSTGRESDB_PASSWORD=${AWAAS_PG_PASSWORD}
      - N8N_ENCRYPTION_KEY=${AWAAS_N8N_ENCRYPTION_KEY}
      - N8N_PORT=5679
      - EXECUTIONS_MODE=regular
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_RUNNERS_ENABLED=true
      - NODES_EXCLUDE=["n8n-nodes-base.executeCommand","n8n-nodes-base.localFileTrigger"]
    volumes:
      - awaas-n8n-data:/home/node/.n8n
    networks:
      - awaas-net
      - shared-net
      - orchestrator-net
    depends_on:
      awaas-postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    user: "1000:1000"

volumes:
  awaas-pg-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/awaas-postgres
  awaas-qdrant-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/awaas-qdrant
  awaas-n8n-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/awaas-n8n

networks:
  awaas-net:
    name: awaas-services
  shared-net:
    external: true
    name: awaas-shared
  orchestrator-net:
    external: true
    name: awaas-orchestrator
