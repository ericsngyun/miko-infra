# trading/docker-compose.yml — INTERNAL data class
# Deploy: Day 4 (alongside awaas_services)
# Gate: INTERNAL routing = cloud allowed. Network isolation from PRIVILEGED verified.
name: awaas-trading

services:
  trading-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${TRADING_PG_USER}
      - POSTGRES_PASSWORD=${TRADING_PG_PASSWORD}
      - POSTGRES_DB=${TRADING_PG_DATABASE}
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
    volumes:
      - trading-pg-data:/var/lib/postgresql/data
    networks:
      - trading-net
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    tmpfs:
      - /tmp:size=64m,mode=1777
    shm_size: '128mb'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRADING_PG_USER} -d ${TRADING_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  trading-redis:
    image: ${REDIS_IMAGE}
    container_name: trading-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${TRADING_REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - trading-redis-data:/data
    networks:
      - trading-net
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    user: "999:999"

  trading-api:
    image: python:3.12-slim
    container_name: trading-api
    restart: unless-stopped
    command: ["uvicorn", "trading.main:app", "--host", "0.0.0.0", "--port", "8500"]
    working_dir: /app
    volumes:
      - ./app:/app:ro
    environment:
      - PG_HOST=trading-postgres
      - PG_PORT=5432
      - PG_USER=${TRADING_PG_USER}
      - PG_PASSWORD=${TRADING_PG_PASSWORD}
      - PG_DATABASE=${TRADING_PG_DATABASE}
      - REDIS_HOST=trading-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${TRADING_REDIS_PASSWORD}
      - LLM_GATEWAY_URL=http://llm-gateway:11435
      - DATA_CLASS=INTERNAL
    networks:
      - trading-net
      - shared-net
    depends_on:
      trading-postgres:
        condition: service_healthy
    security_opt:
      - apparmor:docker-default
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    user: "1000:1000"

volumes:
  trading-pg-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/trading-postgres
  trading-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/trading-redis

networks:
  trading-net:
    name: awaas-trading
  shared-net:
    external: true
    name: awaas-shared
